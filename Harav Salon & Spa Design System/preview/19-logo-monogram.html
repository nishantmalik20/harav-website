<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); }
  body { font-family: var(--font-body); color: var(--fg-1); }
  .card { padding: 24px 28px; box-sizing: border-box; width: 700px; }
  .eyebrow {
    font-family: var(--font-label); font-size: 10px;
    letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--champagne-deep); margin: 0 0 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .eyebrow::after { content: ''; flex: 1; height: 1px; background: var(--bone); }
</style>
</head>
<body>
<div class="card">
  <p class="eyebrow">Brand · Monogram &amp; stacked</p>
  <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:14px;">
    <div style="background:var(--linen); border:1px solid var(--border-hairline); padding:24px; display:flex; align-items:center; justify-content:center; min-height:180px; color:var(--noir);">
      <img src="../assets/logo-monogram.svg" style="width:96px; height:auto;">
    </div>
    <div style="background:var(--bordeaux); padding:24px; display:flex; align-items:center; justify-content:center; min-height:180px; color:var(--pearl);">
      <img src="../assets/logo-monogram.svg" style="width:96px; height:auto;">
    </div>
    <div style="background:var(--blush); padding:24px; display:flex; align-items:center; justify-content:center; min-height:180px; color:var(--noir);">
      <img src="../assets/logo-stacked.svg" style="width:140px; height:auto;">
    </div>
  </div>
  <div style="font-family:var(--font-body); font-size:11px; color:var(--fg-3); margin-top:10px;">Monogram H · Bordeaux variant · Stacked lockup with est. mark</div>
</div></body></html>
