<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); }
  body { font-family: var(--font-body); color: var(--fg-1); }
  .card { padding: 0; box-sizing: border-box; width: 820px; }
  .eyebrow {
    font-family: var(--font-label); font-size: 10px;
    letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--champagne-deep); margin: 0;
    display: flex; align-items: center; gap: 12px;
    padding: 24px 28px 0;
  }
  .eyebrow::after { content: ''; flex: 1; height: 1px; background: var(--bone); }

  /* floating pill header */
  .pill-stage {
    margin: 22px 28px 0;
    padding: 26px 24px;
    border-radius: 14px;
    background:
      linear-gradient(120deg, #8A5A24 0%, #5C3917 52%, #2C1B11 100%);
  }
  .pill {
    display: flex; align-items: center; justify-content: space-between; gap: 18px;
    background: rgba(251, 244, 230, 0.94);
    -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
    border: 1px solid rgba(201, 155, 92, 0.40);
    border-radius: 999px;
    padding: 9px 9px 9px 24px;
    box-shadow: 0 18px 40px rgba(20, 12, 6, 0.34);
  }
  .pill img.logo { height: 24px; width: auto; display: block; }
  .pill nav {
    display: flex; align-items: center; gap: 4px;
    font-family: var(--font-body); font-size: 11px;
    letter-spacing: 0.16em; text-transform: uppercase; color: var(--noir);
  }
  .pill nav a { padding: 10px 14px; border-radius: 999px; color: var(--noir); text-decoration: none; }
  .pill nav a.active { background: var(--noir); color: var(--pearl); }
  .pill .right { display: flex; align-items: center; gap: 18px; }
  .pill .login {
    font-family: var(--font-body); font-size: 11px;
    letter-spacing: 0.16em; text-transform: uppercase; color: var(--noir);
  }
  .pill .cta {
    display: inline-flex; align-items: center; gap: 12px; cursor: pointer; border: 0;
    background: var(--champagne); color: var(--noir);
    font-family: var(--font-body); font-size: 11px;
    letter-spacing: 0.18em; text-transform: uppercase;
    padding: 7px 7px 7px 20px; border-radius: 999px; white-space: nowrap;
  }
  .pill .cta .pip {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--noir); display: grid; place-items: center; flex: none;
  }
  .pill .cta .pip svg { stroke: var(--champagne); }

  .caption {
    padding: 16px 28px 24px;
    font-family: var(--font-body); font-size: 11px; color: var(--fg-3);
  }
</style>
</head>
<body>
<div class="card">
  <p class="eyebrow">Components · Top nav</p>
  <div class="pill-stage">
    <div class="pill">
      <img class="logo" src="../assets/logo-wordmark.svg" alt="Harav">
      <nav>
        <a class="active" href="#">Home</a>
        <a href="#">Treatments</a>
        <a href="#">About</a>
        <a href="#">Journal</a>
        <a href="#">Visit</a>
      </nav>
      <div class="right">
        <span class="login">Login</span>
        <button class="cta">
          Reserve
          <span class="pip"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M9 7h8v8"/></svg></span>
        </button>
      </div>
    </div>
  </div>
  <div class="caption">Floating pill header · cream @ 94% with 10px backdrop blur over the warm hero · active link in an espresso pill · gold Reserve with arrow pip</div>
</div>
</body>
</html>
