<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); }
  body { font-family: var(--font-body); color: var(--fg-1); }
  .card { padding: 24px 28px; box-sizing: border-box; width: 700px; }
  .eyebrow {
    font-family: var(--font-label); font-size: 10px;
    letter-spacing: 0.34em; text-transform: uppercase;
    color: var(--brass-deep); margin: 0 0 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .eyebrow::after { content: ''; flex: 1; height: 5px;
    border-top: 1px solid var(--brass); border-bottom: 1px solid var(--brass); }
</style>
</head>
<body>
<div class="card">
  <p class="eyebrow">Type · Body — Jost</p>
  <p style="font-family:var(--font-body); font-weight:400; font-size:16px; line-height:1.65; color:var(--fg-2); margin:0 0 14px; max-width:540px;">Step in from the cold. Brushed gold on the doors, warm light over the chairs, low light over everything. An hour is held for you — pressed linen, hand-blended oil, the slow choreography of hands that know what they're doing.</p>
  <div style="font-family:var(--font-body); font-size:11px; color:var(--fg-3);">Jost · 300 / 400 / 500 · 16 / 18px body</div>
</div></body></html>
