<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); }
  body { font-family: var(--font-body); color: var(--fg-1); }
  .card { padding: 24px 28px; box-sizing: border-box; width: 700px; }
  .eyebrow {
    font-family: var(--font-label); font-size: 10px;
    letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--champagne-deep); margin: 0 0 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .eyebrow::after { content: ''; flex: 1; height: 1px; background: var(--bone); }
</style>
</head>
<body>
<div class="card">
  <p class="eyebrow">Voice · Product copy applied</p>
  <div style="border:1px solid var(--border-hairline); background:var(--bg-card); padding:20px;">
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:8px;">
      <span style="width:32px; height:1px; background:var(--champagne-deep);"></span>
      <span style="font-family:var(--font-label); font-size:10px; letter-spacing:0.32em; color:var(--champagne-deep);">HAIR</span>
    </div>
    <div style="font-family:var(--font-display); font-size:30px; color:var(--fg-1); line-height:1.1;">Quietude Hair Oil</div>
    <div style="font-family:var(--font-label); font-size:10px; letter-spacing:0.28em; text-transform:uppercase; color:var(--fg-3); margin-top:6px;">Pre-wash · 50ml</div>
    <div style="font-family:var(--font-display); font-style:italic; font-size:16px; color:var(--fg-2); margin-top:14px; line-height:1.55;">A warm, weightless oil for the lengths. Argan, camellia, a breath of vetiver.</div>
    <div style="display:flex; gap:14px; margin-top:14px; padding-top:14px; border-top:1px solid var(--border-hairline);">
      <div>
        <div style="font-family:var(--font-label); font-size:9px; letter-spacing:0.32em; color:var(--fg-muted);">THE RITUAL</div>
        <div style="font-family:var(--font-body); font-size:13px; color:var(--fg-2); margin-top:6px; line-height:1.6;">Warm two drops between palms. Press through mid-lengths to ends. Leave for an hour — or sleep in it.</div>
      </div>
    </div>
  </div>
</div></body></html>
