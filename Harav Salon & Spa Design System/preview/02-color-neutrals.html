<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); }
  body { font-family: var(--font-body); color: var(--fg-1); }
  .card { padding: 24px 28px; box-sizing: border-box; width: 700px; }
  .eyebrow {
    font-family: var(--font-label); font-size: 10px;
    letter-spacing: 0.34em; text-transform: uppercase;
    color: var(--brass-deep); margin: 0 0 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .eyebrow::after { content: ''; flex: 1; height: 5px;
    border-top: 1px solid var(--brass); border-bottom: 1px solid var(--brass); }
</style>
</head>
<body>
<div class="card">
  <p class="eyebrow">Colors · Warm neutral scale</p>
  <div style="display:flex; height:80px; border:1px solid var(--border-hairline);">
    
      <div style="flex:1; background:#241712; display:flex; align-items:flex-end; justify-content:center; padding-bottom:6px;">
        <span style="font-family:var(--font-mono); font-size:9px; color:#FBF4E6; opacity:.75;">900</span>
      </div>
    
      <div style="flex:1; background:#1B1714; display:flex; align-items:flex-end; justify-content:center; padding-bottom:6px;">
        <span style="font-family:var(--font-mono); font-size:9px; color:#FBF4E6; opacity:.75;">800</span>
      </div>
    
      <div style="flex:1; background:#2E2823; display:flex; align-items:flex-end; justify-content:center; padding-bottom:6px;">
        <span style="font-family:var(--font-mono); font-size:9px; color:#FBF4E6; opacity:.75;">700</span>
      </div>
    
      <div style="flex:1; background:#4A3F35; display:flex; align-items:flex-end; justify-content:center; padding-bottom:6px;">
        <span style="font-family:var(--font-mono); font-size:9px; color:#FBF4E6; opacity:.75;">600</span>
      </div>
    
      <div style="flex:1; background:#6B5B49; display:flex; align-items:flex-end; justify-content:center; padding-bottom:6px;">
        <span style="font-family:var(--font-mono); font-size:9px; color:#FBF4E6; opacity:.75;">500</span>
      </div>
    
      <div style="flex:1; background:#8E7C66; display:flex; align-items:flex-end; justify-content:center; padding-bottom:6px;">
        <span style="font-family:var(--font-mono); font-size:9px; color:#241712; opacity:.75;">400</span>
      </div>
    
      <div style="flex:1; background:#B19C82; display:flex; align-items:flex-end; justify-content:center; padding-bottom:6px;">
        <span style="font-family:var(--font-mono); font-size:9px; color:#241712; opacity:.75;">300</span>
      </div>
    
      <div style="flex:1; background:#D1BFA1; display:flex; align-items:flex-end; justify-content:center; padding-bottom:6px;">
        <span style="font-family:var(--font-mono); font-size:9px; color:#241712; opacity:.75;">200</span>
      </div>
    
      <div style="flex:1; background:#E8DCC0; display:flex; align-items:flex-end; justify-content:center; padding-bottom:6px;">
        <span style="font-family:var(--font-mono); font-size:9px; color:#241712; opacity:.75;">100</span>
      </div>
    
      <div style="flex:1; background:#F6EEDF; display:flex; align-items:flex-end; justify-content:center; padding-bottom:6px;">
        <span style="font-family:var(--font-mono); font-size:9px; color:#241712; opacity:.75;">50</span>
      </div>
    
  </div>
  <div style="display:flex; justify-content:space-between; margin-top:10px; font-family:var(--font-body); font-size:11px; color:var(--fg-3);">
    <span>ink-900 — espresso</span>
    <span>ink‑500 — body</span>
    <span>ink‑100 — surfaces</span>
  </div>
</div></body></html>
