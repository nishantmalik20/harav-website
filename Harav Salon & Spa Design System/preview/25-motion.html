<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); }
  body { font-family: var(--font-body); color: var(--fg-1); }
  .card { padding: 24px 28px; box-sizing: border-box; width: 700px; }
  .eyebrow {
    font-family: var(--font-label); font-size: 10px;
    letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--champagne-deep); margin: 0 0 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .eyebrow::after { content: ''; flex: 1; height: 1px; background: var(--bone); }
</style>
</head>
<body>
<div class="card">
  <p class="eyebrow">Motion · Easing &amp; duration</p>
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap:18px;">
    <div style="border:1px solid var(--border-hairline); padding:18px;">
      <div style="font-family:var(--font-display); font-size:20px; margin-bottom:6px;">Entrances</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">cubic-bezier(.22, 1, .36, 1)</div>
      <div style="font-family:var(--font-body); font-size:13px; color:var(--fg-2); margin-top:8px; line-height:1.5;">A soft ease-out. Moves like a heavy curtain. 300ms UI · 600ms sections · 450ms drawer.</div>
    </div>
    <div style="border:1px solid var(--border-hairline); padding:18px;">
      <div style="font-family:var(--font-display); font-size:20px; margin-bottom:6px;">Hovers &amp; presses</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">opacity .75 · .6 · 220ms</div>
      <div style="font-family:var(--font-body); font-size:13px; color:var(--fg-2); margin-top:8px; line-height:1.5;">Opacity only. No scale, no lift, no bounce. Ever.</div>
    </div>
  </div>
</div></body></html>
