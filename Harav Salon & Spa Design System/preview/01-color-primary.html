<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); }
  body { font-family: var(--font-body); color: var(--fg-1); }
  .card { padding: 24px 28px; box-sizing: border-box; width: 700px; }
  .eyebrow {
    font-family: var(--font-label); font-size: 10px; font-weight: 500;
    letter-spacing: 0.30em; text-transform: uppercase;
    color: var(--gold-deep); margin: 0 0 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .eyebrow::after { content: ''; flex: 1; height: 5px;
    border-top: 1px solid var(--gold); border-bottom: 1px solid var(--gold); }
</style>
</head>
<body>
<div class="card">
  <p class="eyebrow">Colors · Primary palette</p>
  <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap: 10px;">

      <div>
        <div style="height:80px; background:#241712; border:1px solid var(--border-hairline);"></div>
        <div style="margin-top:8px;">
          <div style="font-family:var(--font-display); font-size:15px; color:var(--fg-1);">Espresso</div>
          <div style="font-family:var(--font-body); font-size:11px; color:var(--fg-3); margin-top:2px;">#241712</div>
          <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-muted); margin-top:1px;">--espresso</div>
        </div>
      </div>

      <div>
        <div style="height:80px; background:#C99B5C; border:1px solid var(--border-hairline);"></div>
        <div style="margin-top:8px;">
          <div style="font-family:var(--font-display); font-size:15px; color:var(--fg-1);">Gold</div>
          <div style="font-family:var(--font-body); font-size:11px; color:var(--fg-3); margin-top:2px;">#C99B5C</div>
          <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-muted); margin-top:1px;">--gold</div>
        </div>
      </div>

      <div>
        <div style="height:80px; background:#C36602; border:1px solid var(--border-hairline);"></div>
        <div style="margin-top:8px;">
          <div style="font-family:var(--font-display); font-size:15px; color:var(--fg-1);">Terracotta</div>
          <div style="font-family:var(--font-body); font-size:11px; color:var(--fg-3); margin-top:2px;">#C36602</div>
          <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-muted); margin-top:1px;">--terracotta</div>
        </div>
      </div>

      <div>
        <div style="height:80px; background:#33210F; border:1px solid var(--border-hairline);"></div>
        <div style="margin-top:8px;">
          <div style="font-family:var(--font-display); font-size:15px; color:var(--fg-1);">Cocoa</div>
          <div style="font-family:var(--font-body); font-size:11px; color:var(--fg-3); margin-top:2px;">#33210F</div>
          <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-muted); margin-top:1px;">--cocoa</div>
        </div>
      </div>

      <div>
        <div style="height:80px; background:#F6EEDF; border:1px solid var(--border-hairline);"></div>
        <div style="margin-top:8px;">
          <div style="font-family:var(--font-display); font-size:15px; color:var(--fg-1);">Cream</div>
          <div style="font-family:var(--font-body); font-size:11px; color:var(--fg-3); margin-top:2px;">#F6EEDF</div>
          <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-muted); margin-top:1px;">--cream</div>
        </div>
      </div>

  </div>
</div></body></html>
