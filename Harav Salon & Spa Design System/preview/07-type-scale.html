<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); }
  body { font-family: var(--font-body); color: var(--fg-1); }
  .card { padding: 24px 28px; box-sizing: border-box; width: 700px; }
  .eyebrow {
    font-family: var(--font-label); font-size: 10px;
    letter-spacing: 0.34em; text-transform: uppercase;
    color: var(--brass-deep); margin: 0 0 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .eyebrow::after { content: ''; flex: 1; height: 5px;
    border-top: 1px solid var(--brass); border-bottom: 1px solid var(--brass); }
</style>
</head>
<body>
<div class="card">
  <p class="eyebrow">Type · Scale</p>
  <div style="display:flex; flex-direction:column; gap:4px;">
    
      <div style="display:flex; align-items:baseline; gap:18px; border-bottom:1px solid var(--border-hairline); padding:6px 0;">
        <span style="font-family:var(--font-body); font-size:10px; color:var(--fg-muted); width:110px; letter-spacing:0.14em; text-transform:uppercase;">Display 112</span>
        <span style="font-family:var(--font-display); font-size:112px; font-weight:400; font-style:normal; line-height:1; color:var(--fg-1); ">Aa</span>
        <span style="margin-left:auto; font-family:var(--font-mono); font-size:10px; color:var(--fg-muted);">112px · tight</span>
      </div>
    
      <div style="display:flex; align-items:baseline; gap:18px; border-bottom:1px solid var(--border-hairline); padding:6px 0;">
        <span style="font-family:var(--font-body); font-size:10px; color:var(--fg-muted); width:110px; letter-spacing:0.14em; text-transform:uppercase;">H1 84</span>
        <span style="font-family:var(--font-display); font-size:84px; font-weight:500; font-style:normal; line-height:1; color:var(--fg-1); ">Aa</span>
        <span style="margin-left:auto; font-family:var(--font-mono); font-size:10px; color:var(--fg-muted);">84px · tight</span>
      </div>
    
      <div style="display:flex; align-items:baseline; gap:18px; border-bottom:1px solid var(--border-hairline); padding:6px 0;">
        <span style="font-family:var(--font-body); font-size:10px; color:var(--fg-muted); width:110px; letter-spacing:0.14em; text-transform:uppercase;">H2 48</span>
        <span style="font-family:var(--font-display); font-size:48px; font-weight:500; font-style:normal; line-height:1; color:var(--fg-1); ">Aa</span>
        <span style="margin-left:auto; font-family:var(--font-mono); font-size:10px; color:var(--fg-muted);">48px · snug</span>
      </div>
    
      <div style="display:flex; align-items:baseline; gap:18px; border-bottom:1px solid var(--border-hairline); padding:6px 0;">
        <span style="font-family:var(--font-body); font-size:10px; color:var(--fg-muted); width:110px; letter-spacing:0.14em; text-transform:uppercase;">H3 36</span>
        <span style="font-family:var(--font-display); font-size:36px; font-weight:600; font-style:normal; line-height:1; color:var(--fg-1); ">Aa</span>
        <span style="margin-left:auto; font-family:var(--font-mono); font-size:10px; color:var(--fg-muted);">36px · snug</span>
      </div>
    
      <div style="display:flex; align-items:baseline; gap:18px; border-bottom:1px solid var(--border-hairline); padding:6px 0;">
        <span style="font-family:var(--font-body); font-size:10px; color:var(--fg-muted); width:110px; letter-spacing:0.14em; text-transform:uppercase;">Deco 28</span>
        <span style="font-family:var(--font-deco); font-size:28px; font-weight:400; font-style:normal; line-height:1; color:var(--fg-1); letter-spacing:0.22em; text-transform:uppercase;">AA</span>
        <span style="margin-left:auto; font-family:var(--font-mono); font-size:10px; color:var(--fg-muted);">28px · normal</span>
      </div>
    
      <div style="display:flex; align-items:baseline; gap:18px; border-bottom:1px solid var(--border-hairline); padding:6px 0;">
        <span style="font-family:var(--font-body); font-size:10px; color:var(--fg-muted); width:110px; letter-spacing:0.14em; text-transform:uppercase;">Lead 22 italic</span>
        <span style="font-family:var(--font-display); font-size:22px; font-weight:400; font-style:italic; line-height:1; color:var(--fg-1); ">Aa</span>
        <span style="margin-left:auto; font-family:var(--font-mono); font-size:10px; color:var(--fg-muted);">22px · normal</span>
      </div>
    
      <div style="display:flex; align-items:baseline; gap:18px; border-bottom:1px solid var(--border-hairline); padding:6px 0;">
        <span style="font-family:var(--font-body); font-size:10px; color:var(--fg-muted); width:110px; letter-spacing:0.14em; text-transform:uppercase;">Body 16</span>
        <span style="font-family:var(--font-body); font-size:16px; font-weight:400; font-style:normal; line-height:1; color:var(--fg-1); ">Aa</span>
        <span style="margin-left:auto; font-family:var(--font-mono); font-size:10px; color:var(--fg-muted);">16px · relaxed</span>
      </div>
    
  </div>
</div></body></html>
