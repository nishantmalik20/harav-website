<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); }
  body { font-family: var(--font-body); color: var(--fg-1); }
  .card { padding: 24px 28px; box-sizing: border-box; width: 700px; }
  .eyebrow {
    font-family: var(--font-label); font-size: 10px;
    letter-spacing: 0.34em; text-transform: uppercase;
    color: var(--brass-deep); margin: 0 0 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .eyebrow::after { content: ''; flex: 1; height: 5px;
    border-top: 1px solid var(--brass); border-bottom: 1px solid var(--brass); }
</style>
</head>
<body>
<div class="card">
  <p class="eyebrow">Type · Eyebrow + brass double-rule</p>
  <div style="border:1px solid var(--border-hairline); padding:32px; background:var(--bg-card);">
    <div style="display:flex; align-items:center; gap:14px; margin-bottom:18px;">
      <span style="display:inline-block; width:64px; height:5px; border-top:1px solid var(--brass); border-bottom:1px solid var(--brass);"></span>
      <span style="font-family:var(--font-label); font-size:11px; letter-spacing:0.34em; text-transform:uppercase; color:var(--brass-deep);">A RITE OF LOW LIGHT</span>
    </div>
    <div style="font-family:var(--font-display); font-weight:500; font-size:40px; line-height:1.05; color:var(--fg-1); margin-bottom:12px;">An hour, kept in gold.</div>
    <div style="font-family:var(--font-body); font-size:16px; color:var(--fg-2); line-height:1.55;">Brushed gold on the doors, warm light over everything.</div>
  </div>
  <div style="font-family:var(--font-body); font-size:11px; color:var(--fg-3); margin-top:10px;">The signature pattern: gold DOUBLE-rule → eyebrow → display headline → lead.</div>
</div></body></html>
