<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); }
  body { font-family: var(--font-body); color: var(--fg-1); }
  .card { padding: 24px 28px; box-sizing: border-box; width: 700px; }
  .eyebrow {
    font-family: var(--font-label); font-size: 10px;
    letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--champagne-deep); margin: 0 0 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .eyebrow::after { content: ''; flex: 1; height: 1px; background: var(--bone); }
  /* shared component styles for cards */
  .btn-primary {
    display:inline-flex; align-items:center; justify-content:center;
    background: var(--noir); color: var(--pearl);
    font-family: var(--font-body); font-weight: 500; font-size: 13px;
    letter-spacing: 0.18em; text-transform: uppercase;
    padding: 14px 26px; border: 0; border-radius: 0;
    cursor: pointer; transition: opacity 220ms ease;
  }
  .btn-primary:hover { opacity: .75; }
  .btn-ghost {
    background: transparent; color: var(--noir);
    font-family: var(--font-body); font-weight: 500; font-size: 13px;
    letter-spacing: 0.18em; text-transform: uppercase;
    padding: 14px 26px; border: 1px solid var(--noir); border-radius: 0;
    cursor: pointer; transition: background 220ms ease, color 220ms ease;
  }
  .btn-ghost:hover { background: var(--noir); color: var(--pearl); }
  .btn-link {
    background:none; border:0; padding:0;
    font-family: var(--font-body); font-weight: 400; font-size: 14px;
    color: var(--noir); cursor: pointer;
    border-bottom: 1px solid var(--champagne-deep);
    padding-bottom: 2px;
  }
  .input {
    display: block; width: 100%; box-sizing: border-box;
    font-family: var(--font-body); font-size: 16px; color: var(--fg-1);
    background: transparent; border: 0; border-bottom: 1px solid var(--border-soft);
    padding: 10px 0; outline: none; transition: border-color 220ms ease;
  }
  .input:focus { border-bottom-color: var(--champagne-deep); }
  .input::placeholder { color: var(--fg-muted); }
</style>
</head>
<body>
<div class="card">
  <p class="eyebrow">Components · Time slots</p>
  <div style="display:flex; flex-wrap:wrap; gap:10px;">
    
      <div style="
        padding: 14px 18px;
        border: 1px solid var(--border-soft);
        background: var(--bg-card);
        color: var(--fg-1);
        text-decoration: none;
        cursor: pointer;
        min-width: 88px;
        text-align: center;
      ">
        <div style="font-family:var(--font-display); font-size:20px; line-height:1;">9:00<span style="font-family:var(--font-label); font-size:10px; letter-spacing:0.2em; margin-left:4px;">AM</span></div>
        
      </div>
      <div style="
        padding: 14px 18px;
        border: 1px solid var(--noir);
        background: var(--noir);
        color: var(--pearl);
        text-decoration: none;
        cursor: pointer;
        min-width: 88px;
        text-align: center;
      ">
        <div style="font-family:var(--font-display); font-size:20px; line-height:1;">10:30<span style="font-family:var(--font-label); font-size:10px; letter-spacing:0.2em; margin-left:4px;">AM</span></div>
        
      </div>
      <div style="
        padding: 14px 18px;
        border: 1px solid var(--border-soft);
        background: var(--bg-card);
        color: var(--fg-1);
        text-decoration: none;
        cursor: pointer;
        min-width: 88px;
        text-align: center;
      ">
        <div style="font-family:var(--font-display); font-size:20px; line-height:1;">12:00<span style="font-family:var(--font-label); font-size:10px; letter-spacing:0.2em; margin-left:4px;">PM</span></div>
        
      </div>
      <div style="
        padding: 14px 18px;
        border: 1px solid var(--border-soft);
        background: var(--bg-card);
        color: var(--fg-1);
        text-decoration: none;
        cursor: pointer;
        min-width: 88px;
        text-align: center;
      ">
        <div style="font-family:var(--font-display); font-size:20px; line-height:1;">1:30<span style="font-family:var(--font-label); font-size:10px; letter-spacing:0.2em; margin-left:4px;">PM</span></div>
        <div style="font-family:var(--font-label); font-size:8px; letter-spacing:0.28em; color:var(--champagne-deep); margin-top:4px;">FEW LEFT</div>
      </div>
      <div style="
        padding: 14px 18px;
        border: 1px solid var(--border-soft);
        background: var(--bg-card);
        color: var(--fg-1);
        text-decoration: none;
        cursor: pointer;
        min-width: 88px;
        text-align: center;
      ">
        <div style="font-family:var(--font-display); font-size:20px; line-height:1;">3:00<span style="font-family:var(--font-label); font-size:10px; letter-spacing:0.2em; margin-left:4px;">PM</span></div>
        
      </div>
      <div style="
        padding: 14px 18px;
        border: 1px solid var(--border-soft);
        background: var(--bg-card);
        color: var(--ink-300);
        text-decoration: line-through;
        cursor: not-allowed;
        min-width: 88px;
        text-align: center;
      ">
        <div style="font-family:var(--font-display); font-size:20px; line-height:1;">4:30<span style="font-family:var(--font-label); font-size:10px; letter-spacing:0.2em; margin-left:4px;">PM</span></div>
        
      </div>
      <div style="
        padding: 14px 18px;
        border: 1px solid var(--border-soft);
        background: var(--bg-card);
        color: var(--fg-1);
        text-decoration: none;
        cursor: pointer;
        min-width: 88px;
        text-align: center;
      ">
        <div style="font-family:var(--font-display); font-size:20px; line-height:1;">6:00<span style="font-family:var(--font-label); font-size:10px; letter-spacing:0.2em; margin-left:4px;">PM</span></div>
        
      </div>
  </div>
  <div style="font-family:var(--font-body); font-size:11px; color:var(--fg-3); margin-top:14px;">Sharp tiles. Noir on select. Champagne micro-label for scarcity.</div>
</div></body></html>
