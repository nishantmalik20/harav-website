<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); }
  body { font-family: var(--font-body); color: var(--fg-1); }
  .card { padding: 24px 28px; box-sizing: border-box; width: 700px; }
  .eyebrow {
    font-family: var(--font-label); font-size: 10px;
    letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--champagne-deep); margin: 0 0 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .eyebrow::after { content: ''; flex: 1; height: 1px; background: var(--bone); }
</style>
</head>
<body>
<div class="card">
  <p class="eyebrow">Brand · Imagery direction</p>
  <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px;">
    <img src="https://images.unsplash.com/photo-1560750588-73207b1ef5b8?w=400&q=80" style="width:100%; height:160px; object-fit:cover; filter:saturate(.85) sepia(.08);">
    <img src="https://images.unsplash.com/photo-1522337360788-8b13dee7a37e?w=400&q=80" style="width:100%; height:160px; object-fit:cover; filter:saturate(.85) sepia(.08);">
    <img src="https://images.unsplash.com/photo-1487412947147-5cebf100ffc2?w=400&q=80" style="width:100%; height:160px; object-fit:cover; filter:saturate(.85) sepia(.08);">
  </div>
  <div style="font-family:var(--font-body); font-size:11px; color:var(--fg-3); margin-top:10px;">Warm shadows, creamy highlights, partial subjects · golden-hour grade · no clinical before/afters</div>
</div></body></html>
