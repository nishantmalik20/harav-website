<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); }
  body { font-family: var(--font-body); color: var(--fg-1); }
  .card { padding: 24px 28px; box-sizing: border-box; width: 700px; }
  .eyebrow {
    font-family: var(--font-label); font-size: 10px;
    letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--champagne-deep); margin: 0 0 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .eyebrow::after { content: ''; flex: 1; height: 1px; background: var(--bone); }
  /* shared component styles for cards */
  .btn-primary {
    display:inline-flex; align-items:center; justify-content:center;
    background: var(--noir); color: var(--pearl);
    font-family: var(--font-body); font-weight: 500; font-size: 13px;
    letter-spacing: 0.18em; text-transform: uppercase;
    padding: 14px 26px; border: 0; border-radius: 0;
    cursor: pointer; transition: opacity 220ms ease;
  }
  .btn-primary:hover { opacity: .75; }
  .btn-ghost {
    background: transparent; color: var(--noir);
    font-family: var(--font-body); font-weight: 500; font-size: 13px;
    letter-spacing: 0.18em; text-transform: uppercase;
    padding: 14px 26px; border: 1px solid var(--noir); border-radius: 0;
    cursor: pointer; transition: background 220ms ease, color 220ms ease;
  }
  .btn-ghost:hover { background: var(--noir); color: var(--pearl); }
  .btn-link {
    background:none; border:0; padding:0;
    font-family: var(--font-body); font-weight: 400; font-size: 14px;
    color: var(--noir); cursor: pointer;
    border-bottom: 1px solid var(--champagne-deep);
    padding-bottom: 2px;
  }
  .input {
    display: block; width: 100%; box-sizing: border-box;
    font-family: var(--font-body); font-size: 16px; color: var(--fg-1);
    background: transparent; border: 0; border-bottom: 1px solid var(--border-soft);
    padding: 10px 0; outline: none; transition: border-color 220ms ease;
  }
  .input:focus { border-bottom-color: var(--champagne-deep); }
  .input::placeholder { color: var(--fg-muted); }
</style>
</head>
<body>
<div class="card">
  <p class="eyebrow">Components · Service line item</p>
  <div style="border-top:1px solid var(--border-hairline); border-bottom:1px solid var(--border-hairline);">
    
      <div style="display:grid; grid-template-columns: 1fr auto; gap:24px; padding:18px 0; border-top:1px solid var(--border-hairline);">
        <div>
          <div style="display:flex; align-items:baseline; gap:14px;">
            <div style="font-family:var(--font-display); font-size:22px; color:var(--fg-1);">Champagne Facial</div>
            <div style="font-family:var(--font-label); font-size:10px; letter-spacing:0.28em; color:var(--fg-muted);">75 min</div>
          </div>
          <div style="font-family:var(--font-body); font-size:14px; color:var(--fg-2); margin-top:4px;">Hand-blended masque, gold leaf, lymphatic massage.</div>
        </div>
        <div style="font-family:var(--font-display); font-size:22px; color:var(--fg-1); font-variant-numeric:oldstyle-nums; align-self:center;">$185</div>
      </div>
    
      <div style="display:grid; grid-template-columns: 1fr auto; gap:24px; padding:18px 0; border-top:1px solid var(--border-hairline);">
        <div>
          <div style="display:flex; align-items:baseline; gap:14px;">
            <div style="font-family:var(--font-display); font-size:22px; color:var(--fg-1);">Scalp Ritual</div>
            <div style="font-family:var(--font-label); font-size:10px; letter-spacing:0.28em; color:var(--fg-muted);">60 min</div>
          </div>
          <div style="font-family:var(--font-body); font-size:14px; color:var(--fg-2); margin-top:4px;">Warm oil, slow scalp work, a quiet wash.</div>
        </div>
        <div style="font-family:var(--font-display); font-size:22px; color:var(--fg-1); font-variant-numeric:oldstyle-nums; align-self:center;">$145</div>
      </div>
    
      <div style="display:grid; grid-template-columns: 1fr auto; gap:24px; padding:18px 0; border-top:1px solid var(--border-hairline);">
        <div>
          <div style="display:flex; align-items:baseline; gap:14px;">
            <div style="font-family:var(--font-display); font-size:22px; color:var(--fg-1);">Cut &amp; Colour</div>
            <div style="font-family:var(--font-label); font-size:10px; letter-spacing:0.28em; color:var(--fg-muted);">120 min</div>
          </div>
          <div style="font-family:var(--font-body); font-size:14px; color:var(--fg-2); margin-top:4px;">A slow consultation. A considered transformation.</div>
        </div>
        <div style="font-family:var(--font-display); font-size:22px; color:var(--fg-1); font-variant-numeric:oldstyle-nums; align-self:center;">$from 240</div>
      </div>
    
  </div>
</div></body></html>
