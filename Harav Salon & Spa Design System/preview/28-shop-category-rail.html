<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); }
  body { font-family: var(--font-body); color: var(--fg-1); }
  .card { padding: 24px 28px; box-sizing: border-box; width: 700px; }
  .eyebrow {
    font-family: var(--font-label); font-size: 10px;
    letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--champagne-deep); margin: 0 0 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .eyebrow::after { content: ''; flex: 1; height: 1px; background: var(--bone); }
</style>
</head>
<body>
<div class="card" style="padding:24px 28px 0;">
  <p class="eyebrow">Components · Category rail</p>
  <div style="border-bottom:1px solid var(--border-hairline); margin:0 -28px; padding:0 28px;">
    
      <span style="display:inline-block; padding:18px 24px 18px 0; margin-right:8px; position:relative; font-family:var(--font-display); font-size:22px; font-style:normal; color:var(--fg-3);">
        All
        
      </span>
      <span style="display:inline-block; padding:18px 24px 18px 0; margin-right:8px; position:relative; font-family:var(--font-display); font-size:22px; font-style:normal; color:var(--fg-3);">
        Hair
        
      </span>
      <span style="display:inline-block; padding:18px 24px 18px 0; margin-right:8px; position:relative; font-family:var(--font-display); font-size:22px; font-style:italic; color:var(--fg-1);">
        Skin
        <span style="position:absolute; bottom:-1px; left:0; width:calc(100% - 8px); height:1px; background:var(--champagne-deep);"></span>
      </span>
      <span style="display:inline-block; padding:18px 24px 18px 0; margin-right:8px; position:relative; font-family:var(--font-display); font-size:22px; font-style:normal; color:var(--fg-3);">
        Body
        
      </span>
      <span style="display:inline-block; padding:18px 24px 18px 0; margin-right:8px; position:relative; font-family:var(--font-display); font-size:22px; font-style:normal; color:var(--fg-3);">
        Home &amp; ritual
        
      </span>
      <span style="display:inline-block; padding:18px 24px 18px 0; margin-right:8px; position:relative; font-family:var(--font-display); font-size:22px; font-style:normal; color:var(--fg-3);">
        Gift
        
      </span>
  </div>
  <div style="padding:14px 0 16px; font-family:var(--font-body); font-size:11px; color:var(--fg-3);">Display serif, italic on active · champagne underline · scales to many categories</div>
</div></body></html>
