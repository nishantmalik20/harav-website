<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); }
  body { font-family: var(--font-body); color: var(--fg-1); }
  .card { padding: 24px 28px; box-sizing: border-box; width: 700px; }
  .eyebrow {
    font-family: var(--font-label); font-size: 10px; font-weight: 500;
    letter-spacing: 0.30em; text-transform: uppercase;
    color: var(--gold-deep); margin: 0 0 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .eyebrow::after { content: ''; flex: 1; height: 5px;
    border-top: 1px solid var(--gold); border-bottom: 1px solid var(--gold); }
</style>
</head>
<body>
<div class="card">
  <p class="eyebrow">Type · Wordmark &amp; labels</p>
  <div style="display:flex; align-items:center; gap:16px;">
    <img src="../assets/harav-logo.png" alt="Harav logo" style="height:58px; width:auto; display:block;">
    <div style="font-family:var(--font-deco); font-size:46px; letter-spacing:0.30em; text-transform:uppercase; text-indent:0.30em; color:var(--fg-1);">Harav</div>
  </div>
  <div style="margin:14px 0; display:flex; align-items:center; gap:14px;">
    <span style="display:inline-block; width:80px; height:5px; border-top:1px solid var(--gold); border-bottom:1px solid var(--gold);"></span>
    <span style="font-family:var(--font-label); font-size:13px; font-weight:500; letter-spacing:0.36em; text-transform:uppercase; color:var(--gold-deep);">SALON · SPA</span>
  </div>
  <div style="font-family:var(--font-body); font-size:11px; color:var(--fg-3);">Real gold logo + Marcellus wordmark · Jost labels, wide-tracked (0.30–0.36em)</div>
</div></body></html>
