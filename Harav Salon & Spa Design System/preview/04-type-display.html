<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); }
  body { font-family: var(--font-body); color: var(--fg-1); }
  .card { padding: 24px 28px; box-sizing: border-box; width: 700px; }
  .eyebrow {
    font-family: var(--font-label); font-size: 10px; font-weight: 500;
    letter-spacing: 0.30em; text-transform: uppercase;
    color: var(--gold-deep); margin: 0 0 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .eyebrow::after { content: ''; flex: 1; height: 5px;
    border-top: 1px solid var(--gold); border-bottom: 1px solid var(--gold); }
</style>
</head>
<body>
<div class="card">
  <p class="eyebrow">Type · Display — Marcellus</p>
  <div style="font-family:var(--font-display); font-size:84px; line-height:1.04; letter-spacing:0.005em; color:var(--fg-1);">An hour, kept in <span style="color:var(--gold-deep);">gold.</span></div>
  <div style="display:flex; justify-content:space-between; margin-top:18px; font-family:var(--font-body); font-size:11px; color:var(--fg-3);">
    <span>Marcellus · single weight · emphasis in gold, not italic</span>
    <span>Even-stroke serif, deliberately legible</span>
  </div>
</div></body></html>
