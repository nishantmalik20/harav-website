<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); }
  body { font-family: var(--font-body); color: var(--fg-1); }
  .card { padding: 24px 28px; box-sizing: border-box; width: 700px; }
  .eyebrow {
    font-family: var(--font-label); font-size: 10px;
    letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--champagne-deep); margin: 0 0 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .eyebrow::after { content: ''; flex: 1; height: 1px; background: var(--bone); }
  /* shared component styles for cards */
  .btn-primary {
    display:inline-flex; align-items:center; justify-content:center;
    background: var(--noir); color: var(--pearl);
    font-family: var(--font-body); font-weight: 500; font-size: 13px;
    letter-spacing: 0.18em; text-transform: uppercase;
    padding: 14px 26px; border: 0; border-radius: 0;
    cursor: pointer; transition: opacity 220ms ease;
  }
  .btn-primary:hover { opacity: .75; }
  .btn-ghost {
    background: transparent; color: var(--noir);
    font-family: var(--font-body); font-weight: 500; font-size: 13px;
    letter-spacing: 0.18em; text-transform: uppercase;
    padding: 14px 26px; border: 1px solid var(--noir); border-radius: 0;
    cursor: pointer; transition: background 220ms ease, color 220ms ease;
  }
  .btn-ghost:hover { background: var(--noir); color: var(--pearl); }
  .btn-link {
    background:none; border:0; padding:0;
    font-family: var(--font-body); font-weight: 400; font-size: 14px;
    color: var(--noir); cursor: pointer;
    border-bottom: 1px solid var(--champagne-deep);
    padding-bottom: 2px;
  }
  .input {
    display: block; width: 100%; box-sizing: border-box;
    font-family: var(--font-body); font-size: 16px; color: var(--fg-1);
    background: transparent; border: 0; border-bottom: 1px solid var(--border-soft);
    padding: 10px 0; outline: none; transition: border-color 220ms ease;
  }
  .input:focus { border-bottom-color: var(--champagne-deep); }
  .input::placeholder { color: var(--fg-muted); }
</style>
</head>
<body>
<div class="card">
  <p class="eyebrow">Spacing · Scale</p>
  <div style="display:flex; align-items:flex-end; gap:16px; height:130px; border-bottom:1px solid var(--border-hairline); padding-bottom:8px;">
    
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
        <div style="width:18px; height:4px; background:var(--champagne); max-height:100px;"></div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-muted);">4</div>
      </div>
    
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
        <div style="width:18px; height:8px; background:var(--champagne); max-height:100px;"></div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-muted);">8</div>
      </div>
    
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
        <div style="width:18px; height:12px; background:var(--champagne); max-height:100px;"></div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-muted);">12</div>
      </div>
    
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
        <div style="width:18px; height:16px; background:var(--champagne); max-height:100px;"></div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-muted);">16</div>
      </div>
    
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
        <div style="width:18px; height:24px; background:var(--champagne); max-height:100px;"></div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-muted);">24</div>
      </div>
    
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
        <div style="width:18px; height:32px; background:var(--champagne); max-height:100px;"></div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-muted);">32</div>
      </div>
    
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
        <div style="width:18px; height:48px; background:var(--champagne); max-height:100px;"></div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-muted);">48</div>
      </div>
    
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
        <div style="width:18px; height:64px; background:var(--champagne); max-height:100px;"></div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-muted);">64</div>
      </div>
    
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
        <div style="width:18px; height:96px; background:var(--champagne); max-height:100px;"></div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-muted);">96</div>
      </div>
    
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
        <div style="width:18px; height:128px; background:var(--champagne); max-height:100px;"></div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-muted);">128</div>
      </div>
    
  </div>
  <div style="font-family:var(--font-body); font-size:11px; color:var(--fg-3); margin-top:10px;">4 → 128px · luxury runs on whitespace · section padding starts at 96px</div>
</div></body></html>
