<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Harav · Your hours</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); color: var(--fg-1); }
  body { font-family: var(--font-body); -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
  a { color: inherit; text-decoration: none; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="PortalNav.jsx"></script>
<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="UpcomingHour.jsx"></script>
<script type="text/babel" src="VisitHistory.jsx"></script>
<script type="text/babel" src="RebookPanel.jsx"></script>
<script type="text/babel" src="GiftCardBalance.jsx"></script>

<script type="text/babel">
  function App() {
    return (
      <React.Fragment>
        <PortalNav />
        <div style={{ display: 'flex', maxWidth: 1440, margin: '0 auto' }}>
          <Sidebar active="hours" />
          <main style={{ flex: 1, minWidth: 0 }}>
            <div style={{ padding: '40px 48px 16px' }}>
              <div style={{
                fontFamily: 'var(--font-label)', fontSize: 10,
                letterSpacing: '0.32em', textTransform: 'uppercase',
                color: 'var(--champagne-deep)', marginBottom: 12,
              }}>Welcome back</div>
              <h1 style={{
                fontFamily: 'var(--font-display)', fontWeight: 400, fontSize: 56,
                lineHeight: 1.05, letterSpacing: '-0.015em',
                margin: 0, color: 'var(--noir)',
              }}>Anouk.</h1>
            </div>

            <div style={{
              display: 'grid', gridTemplateColumns: 'minmax(0, 1fr) 360px',
              gap: 0, padding: '24px 48px 0',
            }}>
              <div style={{ paddingRight: 32 }}>
                <UpcomingHour />
              </div>
              <RebookPanel />
            </div>

            <div style={{ display: 'grid', gridTemplateColumns: 'minmax(0, 1fr) 360px', padding: '0 48px' }}>
              <div style={{ paddingRight: 32 }}>
                <VisitHistory />
              </div>
              <div style={{ padding: '48px 0 56px' }}>
                <GiftCardBalance />
              </div>
            </div>
          </main>
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
